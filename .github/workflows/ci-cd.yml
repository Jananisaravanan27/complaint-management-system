name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCKER_HUB_USERNAME: priyankamanickam
  BACKEND_IMAGE: priyankamanickam/complaint-backend
  FRONTEND_IMAGE: priyankamanickam/complaint-frontend

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install test dependencies
        run: npm install axios
        working-directory: ./tests

      - name: Start test environment (MongoDB + Backend)
        run: |
          docker compose up -d mongodb backend
          sleep 15

      - name: Run integration tests
        run: node api-test.js
        working-directory: ./tests

      - name: Stop test environment
        run: docker compose down

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME || env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && success()
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          command_timeout: 30m
          script: |
            # Force remove old containers and the MongoDB volume (to fix authentication error)
            docker rm -f complaint-backend complaint-frontend complaint-mongo 2>/dev/null || true
            docker volume rm mongo_data 2>/dev/null || true

            # Pull latest images
            docker pull priyankamanickam/complaint-backend:latest
            docker pull priyankamanickam/complaint-frontend:latest
            docker pull mongo:6

            # Start MongoDB (fresh volume)
            docker run -d --name complaint-mongo --restart unless-stopped \
              -p 27017:27017 \
              -e MONGO_INITDB_ROOT_USERNAME=admin \
              -e MONGO_INITDB_ROOT_PASSWORD=password123 \
              -e MONGO_INITDB_DATABASE=complaintDB \
              -v mongo_data:/data/db \
              mongo:6

            # Start backend
            docker run -d --name complaint-backend --restart unless-stopped \
              -p 5001:5000 \
              --link complaint-mongo:mongodb \
              -e PORT=5000 \
              -e MONGO_URI="mongodb://admin:password123@mongodb:27017/complaintDB?authSource=admin" \
              -e JWT_SECRET="a_very_long_random_secret_key_that_you_make_up" \
              priyankamanickam/complaint-backend:latest

            # Start frontend (no need to fix API_URL because nginx handles proxy)
            docker run -d --name complaint-frontend --restart unless-stopped \
              --link complaint-backend:backend \
              -p 80:80 \
              priyankamanickam/complaint-frontend:latest