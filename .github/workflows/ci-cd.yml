name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCKER_HUB_USERNAME: jananisaravanan9751
  BACKEND_IMAGE: jananisaravanan9751/complaint-backend
  FRONTEND_IMAGE: jananisaravanan9751/complaint-frontend

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install test dependencies
        run: npm install axios
        working-directory: ./tests

      - name: Start test environment (MongoDB + Backend)
        run: |
          docker compose up -d mongodb backend
          sleep 15

      - name: Run integration tests
        run: node api-test.js
        working-directory: ./tests

      - name: Stop test environment
        run: docker compose down

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME || env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          command_timeout: 30m
          script: |
            # Create network (ignore if already exists)
            docker network create complaint-net 2>/dev/null || true

            # Remove ONLY backend and frontend (KEEP MongoDB to preserve data)
            docker rm -f complaint-backend complaint-frontend complaint-prometheus complaint-grafana complaint-node-exporter 2>/dev/null || true

            # Pull latest images
            docker pull jananisaravanan9751/complaint-backend:latest
            docker pull jananisaravanan9751/complaint-frontend:latest
            docker pull mongo:6
            docker pull prom/prometheus:latest
            docker pull grafana/grafana:latest
            docker pull prom/node-exporter:latest

            # Create monitoring directory with prometheus.yml
            mkdir -p /opt/monitoring
            
            cat > /opt/monitoring/prometheus.yml << 'EOF'
            global:
              scrape_interval: 15s
              evaluation_interval: 15s

            scrape_configs:
              - job_name: 'prometheus'
                static_configs:
                  - targets: ['localhost:9090']

              - job_name: 'node-exporter'
                static_configs:
                  - targets: ['complaint-node-exporter:9100']

              - job_name: 'backend'
                metrics_path: '/metrics'
                static_configs:
                  - targets: ['complaint-backend:5000']
            EOF

            # Check if MongoDB is already running, if not start it
            if [ ! "$(docker ps -q -f name=complaint-mongo)" ]; then
              if [ "$(docker ps -aq -f status=exited -f name=complaint-mongo)" ]; then
                docker start complaint-mongo
              else
                docker run -d --name complaint-mongo --restart unless-stopped \
                  --network complaint-net \
                  -p 27017:27017 \
                  -e MONGO_INITDB_ROOT_USERNAME=admin \
                  -e MONGO_INITDB_ROOT_PASSWORD=password123 \
                  -e MONGO_INITDB_DATABASE=complaintDB \
                  -v mongo_data:/data/db \
                  mongo:6
              fi
            fi

            # Start backend
            docker run -d --name complaint-backend --restart unless-stopped \
              --network complaint-net \
              -p 5001:5000 \
              -e PORT=5000 \
              -e MONGO_URI="mongodb://admin:password123@complaint-mongo:27017/complaintDB?authSource=admin" \
              -e JWT_SECRET="your_super_secret_key_change_me_in_production" \
              jananisaravanan9751/complaint-backend:latest

            # Start frontend
            docker run -d --name complaint-frontend --restart unless-stopped \
              --network complaint-net \
              -p 8080:80 \
              jananisaravanan9751/complaint-frontend:latest

            # Start Prometheus with config file
            docker run -d --name complaint-prometheus --restart unless-stopped \
              --network complaint-net \
              -p 9090:9090 \
              -v /opt/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml \
              -v prometheus_data:/prometheus \
              prom/prometheus:latest

            # Start Grafana
            docker run -d --name complaint-grafana --restart unless-stopped \
              --network complaint-net \
              -p 3000:3000 \
              -e GF_SECURITY_ADMIN_PASSWORD=admin \
              -e GF_SECURITY_ADMIN_USER=admin \
              -v grafana_data:/var/lib/grafana \
              grafana/grafana:latest

            # Start Node Exporter
            docker run -d --name complaint-node-exporter --restart unless-stopped \
              --network complaint-net \
              -p 9100:9100 \
              -v /proc:/host/proc:ro \
              -v /sys:/host/sys:ro \
              -v /:/rootfs:ro \
              prom/node-exporter:latest \
              --path.procfs=/host/proc \
              --path.sysfs=/host/sys \
              --path.rootfs=/rootfs

            echo "========================================="
            echo "Deployment completed successfully!"
            echo "========================================="
            echo "Frontend: http://${{ secrets.AZURE_VM_IP }}:8080"
            echo "Backend API: http://${{ secrets.AZURE_VM_IP }}:5001"
            echo "Prometheus: http://${{ secrets.AZURE_VM_IP }}:9090"
            echo "Grafana: http://${{ secrets.AZURE_VM_IP }}:3000 (admin/admin)"
            echo "Node Exporter: http://${{ secrets.AZURE_VM_IP }}:9100"
            echo "========================================="

            sleep 5